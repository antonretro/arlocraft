<div id="controls-help" aria-live="polite">
    <div id="controls-help-title-row">
        <div id="controls-help-title">Controls</div>
        <button id="controls-help-toggle" type="button" title="Toggle info panel [I]">I</button>
    </div>
    <div id="controls-help-body"></div>
</div>

<div id="command-console" style="display: none;">
    <div id="command-log"></div>
    <form id="command-form" autocomplete="off">
        <span id="command-prefix">></span>
        <input id="command-input" type="text" placeholder="Type a command. Try /help" />
    </form>
</div>

<div id="debug-overlay" style="display: none;"></div>

<!-- ═══════════════════ COMMAND BLOCK OVERLAY ═══════════════════ -->
<div id="command-block-overlay" style="display: none;">
    <div class="bh-container">
        <div class="bh-header">
            <h2>Command Block</h2>
            <button class="ni-btn ni-btn-sm" id="btn-cmd-close">X</button>
        </div>
        <div class="bh-body">
            <p class="ni-hint">JavaScript Execution Context (game, world, x, y, z)</p>
            <textarea id="cmd-input-area" class="ni-input-modern" style="width:100%; height:180px; font-family: monospace; font-size: 0.8rem; margin-top: 10px;" placeholder="world.addBlock(x, y+1, z, 'gold_block');"></textarea>
            <div class="ni-footer-actions" style="margin-top: 15px;">
                <button class="ni-btn ni-btn-blue" id="btn-cmd-save">SAVE & CLOSE</button>
            </div>
        </div>
    </div>
</div>

<div id="nuke-flash-overlay"></div>
<div id="break-overlay" style="display:none; position:fixed; pointer-events:none; z-index:200;"></div>
